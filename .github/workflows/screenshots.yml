name: Storybook Screenshots

on:
  push:
    branches: [master]
  pull_request:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build-storybook

      - run: npx http-server storybook-static -p 6006 --silent &

      - run: npx wait-on http://127.0.0.1:6006

      - run: npx test-storybook --url http://127.0.0.1:6006

      - name: Verify baselines (push)
        if: always() && github.event_name == 'push'
        run: npx vr verify --dir screenshots --baseline snapshots.yml

      - name: Submit to Visual Review (PR)
        if: always() && github.event_name == 'pull_request'
        run: |
          npx vr submit \
            --dir screenshots \
            --type storybook \
            --baseline snapshots.yml \
            --token ${{ secrets.VR_API_TOKEN }} \
            --branch ${{ github.head_ref }} \
            --commit ${{ github.event.pull_request.head.sha }} \
            --pr ${{ github.event.pull_request.number }}
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/**/*.png
