name: Storybook Screenshots

on:
  push:
  pull_request:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build-storybook

      - run: npx http-server storybook-static -p 6006 --silent &

      - run: npx wait-on http://127.0.0.1:6006

      - run: npx test-storybook --url http://127.0.0.1:6006

      - name: Submit to Visual Review
        if: always()
        run: |
          npx vr submit \
            --dir screenshots \
            --type storybook \
            --baseline snapshots.yml \
            --api ${{ secrets.VR_API_URL }} \
            --team ${{ secrets.VR_TEAM_ID }} \
            --project ${{ secrets.VR_PROJECT_ID }} \
            --token ${{ secrets.VR_API_TOKEN }} \
            --branch ${{ github.head_ref || github.ref_name }} \
            --commit ${{ github.sha }} \
            ${{ github.event.pull_request.number && format('--pr {0}', github.event.pull_request.number) || '' }}
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/**/*.png
